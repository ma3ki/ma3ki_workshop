<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Conversation</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="api-error-banner" class="error-banner" style="display: none;">
        現在、AI APIが混み合っているか、一時的に不安定な状態です。
    </div>
    <div id="browser-warning" class="error-banner" style="display: none;">
        お使いのブラウザは音声入力に対応していません。Google Chrome や Microsoft Edge でのご利用をおすすめします。
    </div>
    
    <div id="ui-toggle-link" onclick="toggleUI()">UI表示切替</div>
    <div id="clear-session-link" onclick="clearSession()">会話初期化</div>
    <div class="left-pane">
        <h2 class="desktop-title" id="app-title" style="color: #444; margin-bottom: 10px;"></h2>
        <img id="avatar" src="normal_mouse_close_eye_open.webp">
        
        <div id="debug-area" class="debug-input-area" style="margin-top: 10px; display: none; gap: 5px;">
            <input type="text" id="debug-text" placeholder="チャットで話す..." style="flex: 1; border-radius: 20px; border: 1px solid #ddd; padding: 5px 15px;">
            <button onclick="sendDebugText()" style="padding: 5px 15px; font-size: 14px; cursor: pointer;">送信</button>
        </div>

        <div class="controls">
            <button id="talk-btn" onclick="startVoice()">話しかける</button>
        </div>
        <div class="credit" id="credit-text" style="user-select: none;"></div>
    </div>
    <div class="right-pane" id="scroll-area">
        <div id="chat-history" class="chat-container"></div>
    </div>
    <script src="js/audio.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
